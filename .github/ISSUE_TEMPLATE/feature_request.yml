name: Feature request
description: Suggest a new feature or improvement to the site
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem or need does this address?
      placeholder: "What's missing or friction you ran into?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: "What would you like to see added or changed?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "Other approaches you thought of (optional)"
